name: PR Checks

# build-c#-binaries runs on every push to non-main branches and completes even
# when no C# sources changed (build jobs are skipped but the workflow finishes).
# This workflow listens on workflow_run so it always starts after the build
# workflow has had a chance to commit fresh binaries, guaranteeing the checks
# run against the correct tree.
#
# sync-remotes runs on pull_request because it needs PR context (PR number,
# base ref) to pin/unpin Remotes: in DESCRIPTION and commit back to the branch.
# Fork PRs cannot receive a binary commit, so the R checks still run via
# workflow_run against existing binaries (conclusion may be 'success' with all
# build jobs skipped).

on:
  workflow_run:
    workflows: ['build-c#-binaries']
    types: [completed]
    branches-ignore: [main]
  pull_request:

# Cancel any in-progress run for the same branch when a new one arrives.
# head_branch (workflow_run) and head_ref (pull_request) both contain the plain
# branch name on same-repo PRs, so the concurrency group matches correctly.
concurrency:
  group: pr-checks-${{ github.event.workflow_run.head_branch || github.head_ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  sync-remotes:
    if: github.event_name == 'pull_request'
    permissions:
      contents: write # commits the synced Remotes back to the PR branch
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/sync-remotes.yaml@main
    secrets: inherit

  R-CMD-Check:
    if: github.event.workflow_run.conclusion == 'success'
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/R-CMD-check-build.yaml@main
    with:
      os-matrix: '[{"os": "macos-latest", "r": "release"}, {"os": "macos-15-intel", "r": "release"}, {"os": "windows-latest", "r": "release"}, {"os": "ubuntu-latest", "r": "release"}]'

  test-coverage:
    if: github.event.workflow_run.conclusion == 'success'
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/test-coverage.yaml@main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  pkgdown:
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write # required by the pkgdown reusable workflow (no deploy on PRs)
      pull-requests: read # the workflow's check-changes job reads PR file changes
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/pkgdown.yaml@main
