name: Main-Workflow

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: write-all

jobs:
  # Detect changes done in C# code base. If no change were done, skim "build-Csharp-binaries" workflow.
  detect-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      Csharp: ${{ steps.filter.outputs.Csharp }}
    steps:
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        base: ${{ github.ref }}
        filters: |
          Csharp:
            - 'shared/**'

  build-Csharp-binaries:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.Csharp == 'true' && github.event_name == 'pull_request'}}
    uses: ./.github/workflows/build-c#.yaml

  # Manage DESCRIPTION on push to main (dev version bump, tag on release versions).
  description-manager:
    needs: build-Csharp-binaries
    # `needs` only declares ordering; `!cancelled()` lets this job run even when
    # build-Csharp-binaries is skipped (which is the normal case on push to main).
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    # description_manager.yaml was removed upstream (Workflows#232) and split into
    # focused workflows; this shim preserves the bump+tag behavior. Migrate to
    # bump-dev-version.yaml + publish-release.yaml when adopting the split model.
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/bump_dev_version_tag_branch.yaml@main
    # `main` is protected; pass GitHub App credentials so the workflow can push
    # the DESCRIPTION update and release tags via a bypass-listed app token.
    with:
      app-id: ${{ vars.VERSION_BUMPER_APPID }}
    secrets:
      private-key: ${{ secrets.VERSION_BUMPER_SECRET }}

  R-CMD-Check:
    if: ${{ !cancelled() }}
    needs: description-manager
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/R-CMD-check-build.yaml@main
    with:
      os-matrix: '[{"os": "macos-latest", "r": "release"}, {"os": "macos-15-intel", "r": "release"}, {"os": "windows-latest", "r": "release"}, {"os": "ubuntu-latest", "r": "release"}]'

  test-coverage:
    if: ${{ !cancelled() }}
    needs: [R-CMD-Check]
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/test-coverage.yaml@main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  pkgdown:
    if: ${{ !cancelled() }}
    needs: [R-CMD-Check]
    uses: Open-Systems-Pharmacology/Workflows/.github/workflows/pkgdown.yaml@main
