name: build-c#-binaries

on:
  workflow_call:

permissions:
  contents: write

jobs:
  Linux-Build:
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_UBUNTU }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Make
        working-directory: ./shared
        run: make

      - name: Test C# binaries
        run: |
          export R_HOME=/usr/lib/R
          dotnet test ./shared/RDotNet.Tests/ -c Release -d log.txt --no-build
          dotnet test ./shared/rSharpTests/ -c Release -d log.txt --no-build
          dotnet test ./shared/DynamicInterop.Tests/ -c Release -d log.txt --no-build

      - name: Upload Linux binaries
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: inst/lib/rSharp.linux.so


  macOS-Build:
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_MACOS }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Mono (needed by nuget CLI)
        run: brew install mono

      - name: Setup NuGet
        uses: nuget/setup-nuget@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Make
        working-directory: ./shared
        run: make

      - name: Test C# binaries
        run: |
          export R_HOME=/Library/Frameworks/R.framework/Resources
          dotnet test ./shared/RDotNet.Tests/ -c Release -d log.txt --no-build
          dotnet test ./shared/rSharpTests/ -c Release -d log.txt --no-build
          dotnet test ./shared/DynamicInterop.Tests/ -c Release -d log.txt --no-build

      - name: Upload macOS arm64 binaries
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-binaries
          path: inst/lib/rSharp.mac.arm64.so


  Windows-Build:
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_WINDOWS }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Restore native host package (for rSharp.vcxproj)
        run: dotnet restore ./shared/native-deps.csproj --packages ./shared/packages

      - name: Add msbuild to PATH (vcxproj build only)
        uses: microsoft/setup-msbuild@v3

      - name: Build C++ rSharp native extension via msbuild
        run: |
          $env:R_INSTALL_PATH="C:\R"
          msbuild ./shared/rSharp.vcxproj -t:rebuild /p:Configuration=Release /p:Platform=x64 "/p:SolutionDir=${{ github.workspace }}\shared\\"

      - name: Build managed projects via dotnet (NetOnly sln view)
        run: |
          cp ./shared/rSharp.sln ./shared/rSharp.NetOnly.sln
          dotnet sln ./shared/rSharp.NetOnly.sln remove ./shared/rSharp.vcxproj
          dotnet restore ./shared/rSharp.NetOnly.sln
          dotnet build ./shared/rSharp.NetOnly.sln -c Release --no-restore

      - name: Test C# binaries
        run: |
          dotnet test .\shared\RDotNet.Tests\ -c Release -d log.txt --no-build
          dotnet test .\shared\rSharpTests\ -c Release -d log.txt --no-build
          dotnet test .\shared\DynamicInterop.Tests\ -c Release -d log.txt --no-build

      - name: Upload Windows binaries
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-binaries
          path: |
            inst/extdata/rSharp.Examples.dll
            inst/lib/ClrFacade.dll
            inst/lib/DynamicInterop.dll
            inst/lib/RDotNet.dll
            inst/lib/rSharp.dll


  # Single commit of all per-OS binaries. Each build job above only uploads its
  # artifact (no commit), so exactly one push happens here after every OS has
  # finished. This avoids the race that per-OS commits had with the caller's
  # `concurrency: cancel-in-progress`, where the first OS to commit cancelled the
  # others mid-build and left the rebuild partial.
  commit-binaries:
    needs: [Linux-Build, macOS-Build, Windows-Build]
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_UBUNTU || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download Linux binaries
        uses: actions/download-artifact@v7
        with:
          name: linux-binaries
          path: inst/lib/

      - name: Download macOS arm64 binaries
        uses: actions/download-artifact@v7
        with:
          name: macos-arm64-binaries
          path: inst/lib/

      - name: Download Windows binaries
        uses: actions/download-artifact@v7
        with:
          name: windows-binaries
          path: inst/

      - uses: EndBug/add-and-commit@v10
        with:
          pull: '--verbose'
          message: 'Update C# binaries (Commit from Github Actions).'
          default_author: github_actions
          add: |
            inst/lib/rSharp.linux.so
            inst/lib/rSharp.mac.arm64.so
            inst/extdata/rSharp.Examples.dll
            inst/lib/ClrFacade.dll
            inst/lib/DynamicInterop.dll
            inst/lib/RDotNet.dll
            inst/lib/rSharp.dll
