name: build-c#-binaries

on:
  workflow_call:

permissions:
  contents: write

jobs:
  Linux-Build:
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_UBUNTU }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Make
        working-directory: ./shared
        run: make

      - name: Test C# binaries
        run: |
          export R_HOME=/usr/lib/R
          dotnet test ./shared/RDotNet.Tests/ -c Release -d log.txt --no-build
          dotnet test ./shared/rSharpTests/ -c Release -d log.txt --no-build
          dotnet test ./shared/DynamicInterop.Tests/ -c Release -d log.txt --no-build

      - uses: EndBug/add-and-commit@v10
        if: ${{ success() }}
        with:
          pull: '--verbose'
          message: 'Update Linux C# binaries (Commit from Github Actions).'
          default_author: github_actions
          add: '*linux.so'


  macOS-Build:
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_MACOS }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Make
        working-directory: ./shared
        run: make

      - name: Test C# binaries
        run: |
          export R_HOME=/Library/Frameworks/R.framework/Resources
          dotnet test ./shared/RDotNet.Tests/ -c Release -d log.txt --no-build
          dotnet test ./shared/rSharpTests/ -c Release -d log.txt --no-build
          dotnet test ./shared/DynamicInterop.Tests/ -c Release -d log.txt --no-build

      - uses: EndBug/add-and-commit@v10
        if: ${{ success() }}
        with:
          pull: '--verbose'
          message: 'Update macOS C# binaries (Commit from Github Actions).'
          default_author: github_actions
          add: '*mac.arm64.so'

  macOS-Build-x64:
    runs-on: macos-15-intel
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup NuGet
        uses: nuget/setup-nuget@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Make
        working-directory: ./shared
        run: make

      - name: Test C# binaries
        run: |
          export R_HOME=/Library/Frameworks/R.framework/Resources
          dotnet test ./shared/RDotNet.Tests/ -c Release -d log.txt --no-build
          dotnet test ./shared/rSharpTests/ -c Release -d log.txt --no-build
          dotnet test ./shared/DynamicInterop.Tests/ -c Release -d log.txt --no-build

      - uses: EndBug/add-and-commit@v10
        if: ${{ success() }}
        with:
          pull: '--verbose'
          message: 'Update macOS C# binaries (Commit from Github Actions).'
          default_author: github_actions
          add: '*mac.x64.so'


  Windows-Build:
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_WINDOWS }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          nuget restore ./shared/packages.config -PackagesDirectory ./shared/packages
          dotnet restore ./shared/rSharp.sln

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build C# binaries
        run: |
          $env:R_INSTALL_PATH="C:\R"
          msbuild ./shared/rSharp.sln -t:rebuild /p:Configuration=Release /p:Platform=x64

      - name: Test C# binaries
        run: |
          dotnet test .\shared\RDotNet.Tests\ -c Release -d log.txt --no-build
          dotnet test .\shared\rSharpTests\ -c Release -d log.txt --no-build
          dotnet test .\shared\DynamicInterop.Tests\ -c Release -d log.txt --no-build

      - uses: EndBug/add-and-commit@v10
        if: ${{ success() }}
        with:
          pull: '--verbose'
          message: 'Update Windows C# binaries (Commit from Github Actions).'
          default_author: github_actions
          add: '*.dll'
